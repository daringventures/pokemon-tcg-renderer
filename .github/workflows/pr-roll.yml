name: TCG — Score Engine

# Receives dispatch events from participant repos.
# One workflow for everyone, public or private.

on:
  repository_dispatch:
    types: [pr-merged]

concurrency:
  group: ledger-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  roll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Roll for cards
        env:
          PR_AUTHOR_ID: ${{ github.event.client_payload.author_id }}
          PR_AUTHOR_LOGIN: ${{ github.event.client_payload.author_login }}
          REPO_ID: ${{ github.event.client_payload.repo_id }}
          REPO_NAME: ${{ github.event.client_payload.repo_name }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          MERGE_COMMIT_SHA: ${{ github.event.client_payload.merge_commit_sha }}
          PR_ADDITIONS: ${{ github.event.client_payload.additions }}
          PR_DELETIONS: ${{ github.event.client_payload.deletions }}
        run: node .github/scripts/pr-roll.js

      - name: Commit
        run: |
          git config user.name "pack-bot"
          git config user.email "pack-bot@users.noreply.github.com"
          git add ledger/ leaderboard.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🎴 ${{ github.event.client_payload.repo_name }}#${{ github.event.client_payload.pr_number }} [skip ci]"
            git pull --rebase origin main
            git push
          fi
